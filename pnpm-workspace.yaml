packages:
  - 'apps/*'
  - 'packages/*'
  - 'tools/*'

catalog:
  # Core dependencies
  '@testing-library/jest-dom': ^6.6.0
  '@testing-library/react': ^16.1.0
  '@types/node': ^22.10.0
  '@types/react': ^19.0.0
  '@types/react-dom': ^19.0.0
  '@vitest/coverage-v8': ^2.1.0
  '@vitest/ui': ^2.1.0

  # Linting & Formatting
  biome: ^0.3.3
  'happy-dom': ^15.11.0
  lefthook: ^1.9.0
  next: ^16.0.0
  react: ^19.0.0
  react-dom: ^19.0.0
  syncpack: ^13.0.0
  tsup: ^8.3.0

  # Build tools
  turbo: ^2.4.0

  # TypeScript
  typescript: ^5.7.0
  vite: ^6.0.0

  # Testing
  vitest: ^2.1.0

allowBuilds:
  core-js: true
  esbuild: false
  lefthook: true

# Enforce catalog usage to prevent version drift
catalogMode: strict
