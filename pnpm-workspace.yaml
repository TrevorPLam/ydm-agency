packages:
  - 'apps/*'
  - 'packages/*'
  - 'tools/*'
allowBuilds:
  core-js: true
  esbuild: false

catalog:
  # Core dependencies
  '@types/node': ^22.0.0
  '@types/react': ^19.0.0
  '@types/react-dom': ^19.0.0
  '@vitest/ui': ^4.0.0

  # Linting
  biome: ^0.3.3
  next: ^16.0.0
  react: ^19.2.4
  react-dom: ^19.2.4
  tsup: ^8.0.0

  # Build tools
  turbo: ^2.9.12

  # TypeScript
  typescript: ^5.6.0
  vite: ^6.0.0

  # Testing
  vitest: ^4.0.0
  '@vitest/coverage-v8': ^4.0.0
  'happy-dom': ^15.0.0
  '@testing-library/react': ^16.0.0
  '@testing-library/jest-dom': ^6.0.0
